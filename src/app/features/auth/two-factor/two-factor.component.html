<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-primary-900 to-primary-700 p-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8">
    <div class="text-center mb-6">
      <span class="text-4xl">🔐</span>
      <h2 class="text-xl font-semibold mt-3">Vérification en deux étapes</h2>
      <p class="text-sm text-gray-500 mt-1">Entrez le code reçu par email ou SMS</p>
    </div>

    @if (error()) {
      <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">{{ error() }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
      <div>
        <label class="form-label">Code de vérification</label>
        <input type="text" formControlName="code" class="form-input text-center text-2xl tracking-widest"
               placeholder="000000" maxlength="6" autocomplete="one-time-code">
      </div>
      <button type="submit" class="btn-primary w-full">Vérifier</button>
    </form>

    <button (click)="back()" class="mt-4 w-full text-sm text-gray-500 hover:text-gray-700 text-center">
      ← Retour à la connexion
    </button>
  </div>
</div>
