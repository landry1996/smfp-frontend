<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-primary-900 to-primary-700 p-4">
  <div class="w-full max-w-lg bg-white rounded-2xl shadow-2xl p-8">
    <h2 class="text-xl font-semibold mb-6">Créer un compte</h2>

    @if (error()) {
      <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">{{ error() }}</div>
    }
    @if (success()) {
      <div class="mb-4 p-3 bg-green-50 border border-green-200 rounded-lg text-sm text-green-700">
        Compte créé ! <a routerLink="/auth/login" class="underline font-medium">Se connecter</a>
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()" class="grid grid-cols-2 gap-4">
      <div>
        <label class="form-label">Prénom</label>
        <input type="text" formControlName="firstName" class="form-input" placeholder="Jean">
        <p *ngIf="form.get('firstName')?.invalid && form.get('firstName')?.touched"
           class="text-xs text-red-500 mt-1">Champ obligatoire</p>
      </div>
      <div>
        <label class="form-label">Nom</label>
        <input type="text" formControlName="lastName" class="form-input" placeholder="Dupont">
        <p *ngIf="form.get('lastName')?.invalid && form.get('lastName')?.touched"
           class="text-xs text-red-500 mt-1">Champ obligatoire</p>
      </div>
      <div class="col-span-2">
        <label class="form-label">Email</label>
        <input type="email" formControlName="email" class="form-input" placeholder="vous@exemple.com">
        <p *ngIf="form.get('email')?.invalid && form.get('email')?.touched"
           class="text-xs text-red-500 mt-1">Email invalide</p>
      </div>
      <div class="col-span-2">
        <label class="form-label">Téléphone</label>
        <input type="tel" formControlName="phoneNumber" class="form-input" placeholder="+237 6XX XXX XXX">
      </div>
      <div class="col-span-2">
        <label class="form-label">Mot de passe</label>
        <input type="password" formControlName="password" class="form-input" placeholder="••••••••">
        <p *ngIf="form.get('password')?.hasError('minlength') && form.get('password')?.touched"
           class="text-xs text-red-500 mt-1">Minimum 8 caractères</p>
      </div>
      <div class="col-span-2">
        <button type="submit" [disabled]="loading()" class="btn-primary w-full">
          {{ loading() ? 'Création...' : 'Créer mon compte' }}
        </button>
      </div>
    </form>

    <p class="text-center text-sm text-gray-500 mt-4">
      Déjà inscrit ? <a routerLink="/auth/login" class="text-primary-600 hover:underline">Se connecter</a>
    </p>
  </div>
</div>
