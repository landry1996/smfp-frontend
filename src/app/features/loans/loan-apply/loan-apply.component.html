<div class="space-y-6 max-w-2xl mx-auto">
  <div class="flex items-center gap-3">
    <a routerLink="/loans" class="text-sm text-gray-500 hover:text-gray-700">← Retour</a>
    <span class="text-gray-300">/</span>
    <h1 class="text-2xl font-bold text-gray-900">Demande de prêt</h1>
  </div>

  <div class="card">
    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Objet du prêt</label>
          <select formControlName="purpose"
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">Sélectionner</option>
            <option value="PERSONAL">Prêt personnel</option>
            <option value="HOME">Prêt immobilier</option>
            <option value="BUSINESS">Prêt professionnel</option>
            <option value="AUTO">Crédit auto</option>
            <option value="EDUCATION">Prêt étudiant</option>
          </select>
          <p *ngIf="form.get('purpose')?.invalid && form.get('purpose')?.touched"
             class="text-xs text-red-500 mt-1">Champ obligatoire</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Situation professionnelle</label>
          <select formControlName="employment"
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">Sélectionner</option>
            <option value="EMPLOYED">Salarié</option>
            <option value="SELF_EMPLOYED">Indépendant</option>
            <option value="UNEMPLOYED">Sans emploi</option>
          </select>
          <p *ngIf="form.get('employment')?.invalid && form.get('employment')?.touched"
             class="text-xs text-red-500 mt-1">Champ obligatoire</p>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Montant souhaité (XAF)</label>
          <input formControlName="loanAmount" type="number" min="50000"
                 placeholder="500 000"
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <p *ngIf="form.get('loanAmount')?.hasError('min') && form.get('loanAmount')?.touched"
             class="text-xs text-red-500 mt-1">Montant minimum : 50 000 XAF</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Durée (mois)</label>
          <select formControlName="durationMonths"
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option *ngFor="let d of durations" [value]="d">{{ d }} mois</option>
          </select>
        </div>
      </div>

      <div *ngIf="success()"
           class="p-3 bg-green-50 border border-green-200 rounded-lg text-green-700 text-sm">
        Votre demande de prêt a été soumise avec succès. Nous vous contacterons sous 48h.
      </div>
      <div *ngIf="apiError()"
           class="p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">
        {{ apiError() }}
      </div>

      <div class="flex gap-3 pt-2">
        <button type="submit"
                [disabled]="form.invalid || submitting()"
                class="flex-1 py-2.5 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
          {{ submitting() ? 'Soumission...' : 'Soumettre la demande' }}
        </button>
        <a routerLink="/loans/simulator"
           class="px-4 py-2.5 bg-gray-100 text-gray-700 text-sm rounded-lg hover:bg-gray-200 transition-colors">
          Simuler d'abord
        </a>
      </div>

    </form>
  </div>
</div>
