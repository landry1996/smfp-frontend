<div class="space-y-6">
  <div class="flex items-center gap-3">
    <a routerLink="/admin" class="text-sm text-gray-500 hover:text-gray-700">← Utilisateurs</a>
    <span class="text-gray-300">/</span>
    <h1 class="text-2xl font-bold text-gray-900">Contrôle d'accès (RBAC)</h1>
  </div>

  <!-- Skeleton -->
  <div *ngIf="loading()" class="space-y-3">
    <div *ngFor="let i of [1,2,3]" class="h-24 bg-gray-100 rounded-xl animate-pulse"></div>
  </div>

  <!-- Erreur -->
  <div *ngIf="error()" class="card border-l-4 border-red-400 text-red-700 text-sm">
    Erreur lors du chargement des rôles et permissions.
  </div>

  <!-- État vide -->
  <div *ngIf="!loading() && data().length === 0 && !error()"
       class="card text-center py-12 text-gray-400">
    <span class="text-5xl block mb-3">🔐</span>
    <p class="font-medium">Aucun rôle configuré</p>
  </div>

  <!-- Liste des rôles -->
  <div *ngIf="!loading() && data().length > 0" class="space-y-4">
    <div *ngFor="let role of data()" class="card">
      <div class="flex items-start justify-between">
        <div>
          <p class="font-semibold text-gray-900 text-base">{{ role.displayName }}</p>
          <p class="text-sm text-gray-500 mt-0.5">{{ role.description ?? '-' }}</p>
        </div>
        <span class="inline-flex px-2 py-0.5 rounded-full text-xs font-medium bg-purple-100 text-purple-700">
          {{ role.permissionCount }} permission(s)
        </span>
      </div>
      <div *ngIf="role.permissionCodes?.length" class="mt-4">
        <p class="text-xs text-gray-400 uppercase mb-2">Permissions</p>
        <div class="flex flex-wrap gap-1.5">
          <span *ngFor="let perm of role.permissionCodes"
                class="inline-flex px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-600 font-mono">
            {{ perm }}
          </span>
        </div>
      </div>
    </div>
  </div>
</div>
