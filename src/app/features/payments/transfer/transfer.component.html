<div class="space-y-6 max-w-2xl mx-auto">
  <div class="flex items-center gap-3">
    <a routerLink="/payments" class="text-sm text-gray-500 hover:text-gray-700">← Retour</a>
    <span class="text-gray-300">/</span>
    <h1 class="text-2xl font-bold text-gray-900">Virement bancaire</h1>
  </div>

  <div class="card">
    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Compte débiteur (ID)</label>
        <input formControlName="fromAccountId" type="text"
               placeholder="Identifiant du compte source"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        <p *ngIf="form.get('fromAccountId')?.invalid && form.get('fromAccountId')?.touched"
           class="text-xs text-red-500 mt-1">Champ obligatoire</p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Compte bénéficiaire (ID)</label>
        <input formControlName="toAccountId" type="text"
               placeholder="Identifiant du compte destinataire"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        <p *ngIf="form.get('toAccountId')?.invalid && form.get('toAccountId')?.touched"
           class="text-xs text-red-500 mt-1">Champ obligatoire</p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Montant (XAF)</label>
        <input formControlName="amount" type="number" min="100"
               placeholder="0"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        <p *ngIf="form.get('amount')?.hasError('min') && form.get('amount')?.touched"
           class="text-xs text-red-500 mt-1">Montant minimum : 100 XAF</p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Motif du virement</label>
        <input formControlName="description" type="text"
               placeholder="Objet du transfert"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div *ngIf="success()"
           class="p-3 bg-green-50 border border-green-200 rounded-lg text-green-700 text-sm">
        Virement effectué avec succès !
      </div>
      <div *ngIf="apiError()"
           class="p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">
        {{ apiError() }}
      </div>

      <div class="flex gap-3 pt-2">
        <button type="submit"
                [disabled]="form.invalid || submitting()"
                class="flex-1 py-2.5 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
          {{ submitting() ? 'Envoi en cours...' : 'Confirmer le virement' }}
        </button>
        <a routerLink="/payments"
           class="px-4 py-2.5 bg-gray-100 text-gray-700 text-sm rounded-lg hover:bg-gray-200 transition-colors">
          Annuler
        </a>
      </div>

    </form>
  </div>
</div>
