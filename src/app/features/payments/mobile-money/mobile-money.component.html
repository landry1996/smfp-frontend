<div class="space-y-6 max-w-2xl mx-auto">
  <div class="flex items-center gap-3">
    <a routerLink="/payments" class="text-sm text-gray-500 hover:text-gray-700">← Retour</a>
    <span class="text-gray-300">/</span>
    <h1 class="text-2xl font-bold text-gray-900">Mobile Money</h1>
  </div>

  <!-- Sélection de l'opérateur -->
  <div class="grid grid-cols-3 gap-3">
    <button *ngFor="let op of operators"
            (click)="selectOperator(op.code)"
            [class]="selectedProvider() === op.code
              ? 'card border-2 border-blue-500 text-center cursor-pointer'
              : 'card border-2 border-transparent text-center cursor-pointer hover:border-gray-300'">
      <span class="text-3xl block">{{ op.icon }}</span>
      <p class="text-xs font-medium text-gray-700 mt-1">{{ op.name }}</p>
    </button>
  </div>

  <div class="card">
    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Compte débiteur (ID)</label>
        <input formControlName="accountId" type="text"
               placeholder="Identifiant du compte source"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Numéro de téléphone</label>
        <div class="flex">
          <span class="px-3 py-2 bg-gray-100 border border-r-0 border-gray-300 rounded-l-lg text-sm text-gray-600">+237</span>
          <input formControlName="phoneNumber" type="tel"
                 placeholder="6XX XXX XXX"
                 class="flex-1 px-3 py-2 border border-gray-300 rounded-r-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <p *ngIf="form.get('phoneNumber')?.invalid && form.get('phoneNumber')?.touched"
           class="text-xs text-red-500 mt-1">Format invalide (ex: 6XXXXXXXX)</p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Montant (XAF)</label>
        <input formControlName="amount" type="number" min="100"
               placeholder="0"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Motif</label>
        <input formControlName="description" type="text"
               placeholder="Objet du transfert"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div *ngIf="success()"
           class="p-3 bg-green-50 border border-green-200 rounded-lg text-green-700 text-sm">
        Transaction Mobile Money effectuée !
      </div>
      <div *ngIf="apiError()"
           class="p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">
        {{ apiError() }}
      </div>

      <button type="submit"
              [disabled]="form.invalid || submitting() || !selectedProvider()"
              class="w-full py-2.5 bg-green-600 text-white text-sm font-medium rounded-lg hover:bg-green-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
        {{ submitting() ? 'Envoi...' : 'Envoyer via Mobile Money' }}
      </button>

    </form>
  </div>
</div>
