<!-- Floating button -->
<div class="fixed bottom-6 right-6 z-50 flex flex-col items-end gap-3">
  <!-- Chat window -->
  <div *ngIf="open()" class="w-80 sm:w-96 h-[480px] bg-white rounded-2xl shadow-2xl border border-gray-200 flex flex-col overflow-hidden">
    <!-- Header -->
    <div class="bg-primary-700 text-white px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="text-lg">🤖</span>
        <div>
          <p class="text-sm font-semibold">Assistant SMFP</p>
          <p class="text-xs text-primary-200">{{ connecting() ? 'Connexion...' : 'En ligne' }}</p>
        </div>
      </div>
      <button (click)="toggle()" class="text-primary-200 hover:text-white">✕</button>
    </div>
    <!-- Messages -->
    <div class="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50" #msgContainer>
      <div *ngFor="let msg of messages()"
           [class]="msg.sender === 'USER' ? 'flex justify-end' : 'flex justify-start'">
        <div [class]="msg.sender === 'USER'
                ? 'bg-primary-600 text-white rounded-2xl rounded-tr-sm px-3 py-2 max-w-[75%] text-sm'
                : 'bg-white border border-gray-200 text-gray-800 rounded-2xl rounded-tl-sm px-3 py-2 max-w-[75%] text-sm shadow-sm'">
          {{ msg.content }}
        </div>
      </div>
      <div *ngIf="connecting()" class="flex justify-start">
        <div class="bg-white border border-gray-200 rounded-2xl px-3 py-2 text-sm text-gray-400">
          <span class="animate-pulse">●●●</span>
        </div>
      </div>
    </div>
    <!-- Input -->
    <div class="p-3 border-t border-gray-200 bg-white flex gap-2">
      <input [formControl]="messageControl" type="text" placeholder="Votre message..."
             class="flex-1 form-input text-sm py-2"
             (keydown.enter)="sendMessage()">
      <button (click)="sendMessage()" class="btn-primary px-3 py-2 text-sm">➤</button>
    </div>
  </div>
  <!-- Floating button -->
  <button (click)="toggle()"
          class="w-14 h-14 rounded-full bg-primary-600 text-white shadow-lg hover:bg-primary-700 text-2xl flex items-center justify-center transition-colors">
    {{ open() ? '✕' : '💬' }}
  </button>
</div>
