<!-- Fixed floating widget -->
<div class="smfp-chat-widget">

  <!-- Chat window -->
  @if (open()) {
    <div class="smfp-chat-window card border-0 shadow-lg rounded-3 overflow-hidden d-flex flex-column">

      <!-- Header -->
      <div class="d-flex align-items-center justify-content-between px-3 py-3 bg-primary text-white">
        <div class="d-flex align-items-center gap-2">
          <div class="smfp-chat-avatar bg-white text-primary rounded-circle d-flex align-items-center justify-content-center">
            <i class="bi bi-robot fs-6"></i>
          </div>
          <div>
            <div class="fw-bold small">Assistant SMFP</div>
            @if (connecting()) {
              <div class="d-flex align-items-center gap-1" style="font-size:.7rem;opacity:.8">
                <span class="spinner-border spinner-border-sm" style="width:.6rem;height:.6rem;border-width:1px"></span>
                Connexion...
              </div>
            } @else {
              <div class="text-white-50" style="font-size:.7rem">En ligne</div>
            }
          </div>
        </div>
        <button class="btn-close btn-close-white btn-sm" (click)="toggle()"></button>
      </div>

      <!-- Messages -->
      <div class="smfp-chat-messages flex-grow-1 p-3 overflow-auto bg-light" style="max-height:340px">
        @if (messages().length === 0) {
          <div class="text-center text-muted small py-4">
            <i class="bi bi-chat-dots fs-2 d-block mb-2 opacity-25"></i>
            Demarrez la conversation...
          </div>
        }
        @for (msg of messages(); track msg.id) {
          <div class="mb-2 d-flex"
               [class.justify-content-end]="msg.sender === 'USER'"
               [class.justify-content-start]="msg.sender !== 'USER'">
            <div class="px-3 py-2 rounded-3"
                 style="max-width:80%;font-size:.85rem;word-break:break-word"
                 [class.bg-primary]="msg.sender === 'USER'"
                 [class.text-white]="msg.sender === 'USER'"
                 [class.bg-white]="msg.sender !== 'USER'"
                 [class.border]="msg.sender !== 'USER'">
              {{ msg.content }}
            </div>
          </div>
        }
      </div>

      <!-- Input -->
      <div class="p-2 border-top bg-white">
        <div class="input-group">
          <input type="text" class="form-control form-control-sm"
                 placeholder="Ecrivez un message..."
                 [formControl]="messageControl"
                 (keyup.enter)="sendMessage()">
          <button class="btn btn-primary btn-sm" (click)="sendMessage()">
            <i class="bi bi-send-fill"></i>
          </button>
        </div>
      </div>

    </div>
  }

  <!-- Toggle button -->
  <button class="btn btn-primary rounded-circle shadow smfp-chat-toggle"
          (click)="toggle()"
          [title]="open() ? 'Fermer' : 'Assistant'">
    @if (open()) {
      <i class="bi bi-x-lg fs-5"></i>
    } @else {
      <i class="bi bi-chat-dots-fill fs-5"></i>
    }
  </button>

</div>
