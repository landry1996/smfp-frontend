<div class="space-y-6">
  <div class="flex items-center gap-3">
    <a routerLink="/fraud" class="text-sm text-gray-500 hover:text-gray-700">← Fraude</a>
    <span class="text-gray-300">/</span>
    <h1 class="text-2xl font-bold text-gray-900">Règles de détection</h1>
  </div>

  <!-- Skeleton -->
  <div *ngIf="loading()" class="space-y-2">
    <div *ngFor="let i of [1,2,3]" class="h-16 bg-gray-100 rounded-lg animate-pulse"></div>
  </div>

  <!-- Erreur -->
  <div *ngIf="error()" class="card border-l-4 border-red-400 text-red-700 text-sm">
    Erreur lors du chargement des règles.
  </div>

  <!-- État vide -->
  <div *ngIf="!loading() && data().length === 0 && !error()"
       class="card text-center py-12 text-gray-400">
    <span class="text-5xl block mb-3">⚙️</span>
    <p class="font-medium">Aucune règle configurée</p>
  </div>

  <!-- Tableau des règles -->
  <div *ngIf="!loading() && data().length > 0" class="card overflow-x-auto p-0">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 border-b border-gray-200">
        <tr>
          <th class="px-4 py-3 text-left font-semibold text-gray-600">Code</th>
          <th class="px-4 py-3 text-left font-semibold text-gray-600">Nom</th>
          <th class="px-4 py-3 text-left font-semibold text-gray-600">Description</th>
          <th class="px-4 py-3 text-center font-semibold text-gray-600">Priorité</th>
          <th class="px-4 py-3 text-center font-semibold text-gray-600">Statut</th>
          <th class="px-4 py-3 text-center font-semibold text-gray-600">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-100">
        <tr *ngFor="let rule of data()" class="hover:bg-gray-50 transition-colors">
          <td class="px-4 py-3 font-mono text-xs text-gray-600">{{ rule.code }}</td>
          <td class="px-4 py-3 font-medium text-gray-900">{{ rule.name }}</td>
          <td class="px-4 py-3 text-gray-600 max-w-xs truncate">{{ rule.description ?? '-' }}</td>
          <td class="px-4 py-3 text-center font-semibold text-gray-700">{{ rule.priority ?? '-' }}</td>
          <td class="px-4 py-3 text-center">
            <span [class]="(rule.enabled ? 'ACTIVE' : 'INACTIVE') | statusBadge">
              {{ rule.enabled ? 'Activée' : 'Désactivée' }}
            </span>
          </td>
          <td class="px-4 py-3 text-center">
            <button (click)="toggleRule(rule)" class="text-xs text-blue-600 hover:underline">
              {{ rule.enabled ? 'Désactiver' : 'Activer' }}
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
