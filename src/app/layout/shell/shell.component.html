<div class="flex h-screen bg-gray-50">
  <!-- Sidebar -->
  <aside [class]="sidebarOpen() ? 'w-64' : 'w-16'" class="bg-primary-900 text-white flex flex-col transition-all duration-300 overflow-hidden">
    <!-- Logo -->
    <div class="flex items-center gap-3 px-4 py-5 border-b border-primary-700">
      <span class="text-2xl">🏦</span>
      <span *ngIf="sidebarOpen()" class="font-bold text-lg tracking-tight">SMFP</span>
    </div>
    <!-- Navigation -->
    <nav class="flex-1 overflow-y-auto py-4">
      <a *ngFor="let item of navItems()"
         [routerLink]="item.route"
         routerLinkActive="bg-primary-700"
         [routerLinkActiveOptions]="{ exact: !!item.exact }"
         class="flex items-center gap-3 px-4 py-2.5 text-sm text-primary-100 hover:bg-primary-800 rounded-lg mx-2 mb-1 transition-colors">
        <span class="text-base flex-shrink-0">{{ item.icon }}</span>
        <span *ngIf="sidebarOpen()" class="truncate">{{ item.label }}</span>
      </a>
    </nav>
    <!-- User -->
    <div class="border-t border-primary-700 p-4">
      <div *ngIf="user() as u" class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-primary-600 flex items-center justify-center text-sm font-bold flex-shrink-0">
          {{ u.firstName?.charAt(0) }}{{ u.lastName?.charAt(0) }}
        </div>
        <div *ngIf="sidebarOpen()" class="min-w-0">
          <p class="text-sm font-medium truncate">{{ u.firstName }} {{ u.lastName }}</p>
          <p class="text-xs text-primary-300 truncate">{{ u.role }}</p>
        </div>
      </div>
      <button *ngIf="sidebarOpen()" (click)="logout()"
              class="mt-3 w-full text-xs text-primary-300 hover:text-white text-left px-1 py-1 transition-colors">
        ← Déconnexion
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Topbar -->
    <header class="bg-white border-b border-gray-200 px-4 py-3 flex items-center gap-4">
      <button (click)="toggleSidebar()" class="text-gray-500 hover:text-gray-700 p-1 rounded">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <div class="flex-1"></div>
      <a routerLink="/profile" class="text-sm text-gray-600 hover:text-primary-600 font-medium transition-colors">
        Mon profil
      </a>
    </header>
    <!-- Page content -->
    <main class="flex-1 overflow-y-auto p-6">
      <router-outlet />
    </main>
  </div>

  <!-- Chatbot widget -->
  <app-chatbot-widget />
</div>
